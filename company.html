<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法人向けサポート | Pidam Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #0a0d1a; }

    .page-block {
      position: relative;
      width: 100%;
    }
    .page-block::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }
    .page-block img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .back-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 100;
      background: rgba(10,13,26,0.75);
      border: 1px solid rgba(201,168,76,0.35);
      color: #c9a84c;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 0.45rem 1.1rem;
      border-radius: 9999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      text-decoration: none;
      font-family: sans-serif;
      transition: background 0.3s;
    }
    .back-btn:hover { background: rgba(201,168,76,0.15); }
  </style>
</head>
<body>

  <a class="back-btn" href="support.html">← 戻る</a>

  <!-- 1枚目: company.jpg -->
  <div class="page-block">
    <img class="bg" src="images/company.jpg" alt="法人向けサポート 1 - Pidam Gallery">
  </div>

  <!-- 2枚目: company2.jpg -->
  <div class="page-block">
    <img class="bg" src="images/company2.jpg" alt="法人向けサポート 2 - Pidam Gallery">
  </div>

  <!-- 3枚目: company3.jpg -->
  <div class="page-block">
    <img class="bg" src="images/company3.jpg" alt="法人向けサポート 3 - Pidam Gallery">
  </div>

</body>
</html>
