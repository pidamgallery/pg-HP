<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pidam Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #0a0d1a; }

    .page-wrapper {
      position: relative;
      width: 100%;
    }
    .page-wrapper img.bg {
      display: block;
      width: 100%;
      height: auto;
    }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .btn-link {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 9999px;
      /* デバッグ: background: rgba(255,0,0,0.3); */
    }
    .btn-link:hover { background: rgba(255,255,255,0.08); }

    .btn-gallery { left: 11%; top: 48%; width: 25%; height: 7.5%; }
    .btn-support { left: 11%; top: 63%; width: 25%; height: 7.5%; }
    .btn-about   { left: 11%; top: 78%; width: 25%; height: 7.5%; }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <img class="bg" src="images/index.jpg" alt="Pidam Gallery">

    <div class="overlay">
      <a class="btn-link btn-gallery" href="gallery.html" aria-label="作品を見る"></a>
      <a class="btn-link btn-support" href="support.html" aria-label="AIサポートを見る"></a>
      <a class="btn-link btn-about"   href="activity.html" aria-label="活動実績を見る"></a>
    </div>
  </div>

</body>
</html>
