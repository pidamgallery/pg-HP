<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Support | Pidam Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #0a0d1a; }

    .page-wrapper {
      position: relative;
      width: 100%;
    }
    .page-wrapper::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }
    .page-wrapper img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .btn-link {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 9999px;
      /* デバッグ: background: rgba(255,0,0,0.3); */
    }
    .btn-link:hover { background: rgba(255,255,255,0.08); }

    /* QRコードは角丸小さめ */
    .btn-qr {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 6px;
      /* デバッグ: background: rgba(255,0,0,0.3); */
    }
    .btn-qr:hover { background: rgba(255,255,255,0.08); }

    /* その他サポート: 画像に既にボタン枠があるため透明リンク */
    .btn-other {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 9999px;
      /* デバッグ: background: rgba(255,0,0,0.3); */
    }
    .btn-other:hover { background: rgba(255,255,255,0.08); }

    /* ボタン位置 (%) */
    .btn-beginner { left: 10%; top: 28%; width: 25%; height: 8%; }  /* 初心者向け講座 */
    .btn-houjin   { left: 10%; top: 58%; width: 25%; height: 8%; }  /* 法人向けサポート */
    .btn-other    { left: 10%; top: 82%; width: 25%; height: 8%; }  /* その他サポート */
    .btn-qr       { left: 51%; top: 74%; width: 7%;  height: 13%; } /* QRコード */

    /* トップへ戻る */
    .back-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 100;
      background: rgba(10,13,26,0.75);
      border: 1px solid rgba(201,168,76,0.35);
      color: #c9a84c;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 0.45rem 1.1rem;
      border-radius: 9999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      text-decoration: none;
      font-family: sans-serif;
      transition: background 0.3s;
    }
    .back-btn:hover { background: rgba(201,168,76,0.15); }
  </style>
</head>
<body>

  <a class="back-btn" href="index.html">← トップへ</a>

  <div class="page-wrapper">
    <img class="bg" src="images/support.jpg" alt="AI Support - Pidam Gallery">

    <div class="overlay">

      <!-- 初心者向け講座 -->
      <a class="btn-link btn-beginner" href="beginner.html" aria-label="初心者向け講座"></a>

      <!-- 法人向けサポート -->
      <a class="btn-link btn-houjin" href="company.html" aria-label="法人向けサポート"></a>

      <!-- その他サポート: 新規ページへ -->
      <a class="btn-other" href="other_support.html" aria-label="その他サポート"></a>

      <!-- QRコード（LINE相談）: リンク先を href="" に入れる -->
      <a class="btn-qr" href="" target="_blank" aria-label="LINE相談はこちら"></a>

    </div>
  </div>

</body>
</html>
