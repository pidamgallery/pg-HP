<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動実績 | Pidam Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #f0f4f8; }
    .page-wrapper { position: relative; width: 100%; }
    .page-wrapper img.bg {
      display: block; width: 100%; height: auto;
    }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .card-link {
      position: absolute; display: block; cursor: pointer; border-radius: 8px;
      /* デバッグ: background: rgba(255,0,0,0.3); */
    }
    .card-link:hover { background: rgba(0,50,120,0.08); }
    .card-logo   { left:  2%;  top: 28%; width: 15%; height: 52%; }
    .card-art    { left: 18%;  top: 28%; width: 15%; height: 52%; }
    .card-meishi { left: 34%;  top: 28%; width: 15%; height: 52%; }
    .card-festa  { left: 50%;  top: 28%; width: 15%; height: 52%; }
    .card-music  { left: 66%;  top: 28%; width: 15%; height: 52%; }
    .card-shop   { left: 82%;  top: 28%; width: 15%; height: 52%; }
    .back-btn {
      position: fixed; top: 1.2rem; left: 1.2rem; z-index: 100;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,50,120,0.25); color: #1a3a6b;
      font-size: 0.78rem; letter-spacing: 0.15em;
      padding: 0.45rem 1.1rem; border-radius: 9999px;
      cursor: pointer; backdrop-filter: blur(6px);
      text-decoration: none; font-family: sans-serif; transition: background 0.3s;
    }
    .back-btn:hover { background: rgba(0,50,120,0.1); }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">← トップへ</a>
  <div class="page-wrapper">
    <img class="bg" src="images/Activity.jpg" alt="活動実績 - Pidam Gallery">
    <div class="overlay">
      <a class="card-link card-logo"   href="activity_logo.html"         aria-label="ロゴ制作"></a>
      <a class="card-link card-art"    href="activity_art.html"          aria-label="AIアート"></a>
      <a class="card-link card-meishi" href="activity_meishi_festa.html" aria-label="名刺制作"></a>
      <a class="card-link card-festa"  href="activity_meishi_festa.html" aria-label="フェスタ出店"></a>
      <a class="card-link card-music"  href="activity_music.html"        aria-label="音楽・動画制作"></a>
      <a class="card-link card-shop"   href="shop.html"                  aria-label="作品販売"></a>
    </div>
  </div>
</body>
</html>
