<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>その他サポート | Pidam Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #cfe8f7; }

    .page-wrapper {
      position: relative;
      width: 100%;
    }
    .page-wrapper::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }
    .page-wrapper img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    .back-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,50,120,0.25);
      color: #1a3a6b;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 0.45rem 1.1rem;
      border-radius: 9999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      text-decoration: none;
      font-family: sans-serif;
      transition: background 0.3s;
    }
    .back-btn:hover { background: rgba(0,50,120,0.1); }
  </style>
</head>
<body>

  <a class="back-btn" href="support.html">← 戻る</a>

  <div class="page-wrapper">
    <img class="bg" src="images/other_support.jpg" alt="その他サポート - Pidam Gallery">
  </div>

</body>
</html>
